services:
  - type: web
    name: movienest-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render сам сгенерирует надёжный случайный секрет
      - key: CLIENT_ORIGIN
        sync: false # задайте вручную в Render Dashboard, например:
        # https://<ваш-github-username>.github.io
      - key: MONGODB_URI
        sync: false # задайте вручную в Render Dashboard — строка подключения
        # к вашему бесплатному кластеру MongoDB Atlas, см. DEPLOY.md

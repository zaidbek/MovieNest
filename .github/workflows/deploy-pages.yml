name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  # Позволяет запустить деплой вручную из вкладки Actions на GitHub
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          # Автоматически вычисленный GitHub-ом путь вида "/MovieNest--/" —
          # не нужно вручную вписывать имя репозитория.
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Адрес задеплоенного backend — задайте в Settings → Secrets and
          # variables → Actions → Variables → New repository variable
          # Имя: VITE_API_ROOT   Значение, например: https://movienest-backend.onrender.com/api
          VITE_API_ROOT: ${{ vars.VITE_API_ROOT }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
